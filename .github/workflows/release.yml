name: CI & Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # needed to create a GitHub Release

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify __version__ matches the git tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $content = Get-Content perch/__init__.py -Raw
          if ($content -match '__version__\s*=\s*"([^"]+)"') {
            $version = "v" + $matches[1]
            if ($tag -ne $version) {
              throw "Tag $tag does not match perch.__version__ ($version). Bump __version__ before tagging."
            }
            Write-Host "OK: tag $tag matches __version__ $version"
          } else {
            throw "Could not find __version__ in perch/__init__.py"
          }

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest

      - name: Build EXE
        run: |
          pyinstaller --noconfirm --onefile --windowed `
            --name "Perch" `
            --icon "assets/perch.ico" `
            --add-data "assets/perch.png;assets" `
            --add-data "assets/perch.ico;assets" `
            --collect-all customtkinter `
            run.py

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Perch-windows
          path: dist/Perch.exe

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Perch.exe
          generate_release_notes: true
