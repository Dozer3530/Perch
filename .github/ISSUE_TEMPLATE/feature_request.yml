name: Feature request
description: Suggest a new capability or an improvement to an existing one.
title: "[feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: The problem you're trying to solve
      description: |
        Describe the situation that prompted the request. What's awkward,
        slow, or missing in today's workflow?
    validations:
      required: true

  - type: textarea
    id: idea
    attributes:
      label: Proposed solution
      description: |
        What should Perch do? UI mockups, command line sketches, or just
        a paragraph are all fine.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, and why they didn't fit.
    validations:
      required: false

  - type: dropdown
    id: sensor
    attributes:
      label: Sensor / preset this relates to
      description: If the request is specific to a sensor model.
      multiple: false
      options:
        - Not specific to a sensor
        - MicaSense RedEdge-MX Dual
        - MicaSense Altum-PT
        - A sensor Perch doesn't yet support
    validations:
      required: false
